                                        <div className="h-3 bg-white rounded-full overflow-hidden"><div className="h-full bar-fill" style={{width:`${pct}%`, background:'linear-gradient(90deg,#3b82f6,#10b981)'}}></div></div>
                                    </div>
                                )}
                                <div className="space-y-5">
                                    {stakeholders.map(s => {
                                        const strat = getPowerInterestStrategy(s.power, s.interest);
                                        return (
                                            <div key={s.id} style={{pageBreakInside:'avoid'}} className="border border-gray-200 rounded-lg overflow-hidden">
                                                <div className="flex items-center justify-between p-3 bg-gray-50 border-b" style={{borderLeft:`4px solid ${getGroupColor(s.group)}`}}>
                                                    <div className="flex items-center gap-3">
                                                        <span className="font-bold text-gray-800 text-sm">{s.name}</span>
                                                        <StrategyBadge strategy={strat}/>
                                                    </div>
                                                    {!isExporting && (
                                                        <div className="flex gap-2">
                                                            <button 
                                                                onClick={()=>suggestAction(s)} 
                                                                disabled={isSuggesting[s.id]}
                                                                className={`text-xs px-2 py-1 rounded font-medium flex items-center gap-1 transition ${isSuggesting[s.id] ? 'bg-gray-100 text-gray-500 cursor-wait' : 'bg-purple-100 text-purple-700 hover:bg-purple-200'}`}
                                                            >
                                                                {isSuggesting[s.id] ? '⏳ Thinking...' : '✨ AI Suggest'}
                                                            </button>
                                                            <button onClick={()=>addAction(s.id)} className="text-xs bg-blue-600 text-white px-2 py-1 rounded hover:bg-blue-700 flex items-center gap-1"><IconPlus/> Action</button>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="p-3">
                                                    {(s.actions||[]).length === 0 ? <p className="text-xs text-gray-400 italic py-2">No actions yet.</p> : (
                                                        <div className="space-y-2">
                                                            {(s.actions||[]).map(a => (
                                                                <div key={a.id} className="flex flex-col md:flex-row gap-2 md:items-center bg-white border border-gray-100 rounded p-2">
                                                                    {isExporting ? (
                                                                        <React.Fragment>
                                                                            <span className="flex-1 text-sm text-gray-700">{a.text||"(untitled)"}</span>
                                                                            <span className="text-xs text-gray-500">{a.owner}</span>
                                                                            <span className="text-xs text-gray-500">{a.due}</span>
                                                                            <span className={`text-xs px-2 py-0.5 rounded border ${STATUS_COLORS[a.status]}`}>{a.status}</span>
                                                                        </React.Fragment>
                                                                    ) : (
                                                                        <React.Fragment>
                                                                            <input value={a.text} onChange={e=>updateAction(s.id,a.id,'text',e.target.value)} placeholder="Action description..." className="flex-1 border rounded p-1.5 text-sm"/>
                                                                            <input value={a.owner} onChange={e=>updateAction(s.id,a.id,'owner',e.target.value)} placeholder="Owner" className="w-28 border rounded p-1.5 text-sm"/>
                                                                            <input type="date" value={a.due} onChange={e=>updateAction(s.id,a.id,'due',e.target.value)} className="border rounded p-1.5 text-sm"/>
                                                                            <select value={a.status} onChange={e=>updateAction(s.id,a.id,'status',e.target.value)} className={`border rounded p-1.5 text-xs font-medium ${STATUS_COLORS[a.status]}`}><option>Planned</option><option>In Progress</option><option>Done</option></select>
                                                                            <button onClick={()=>removeAction(s.id,a.id)} className="text-red-400 hover:text-red-600 p-1"><IconTrash/></button>
                                                                        </React.Fragment>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </React.Fragment>
                        )}
                    </div>
                );
            };

            // ============ STRATEGIC REPORT ============
            const StrategyReportView = () => (
                <div className="bg-white p-6 rounded-lg shadow-sm">
                    <div className="mb-6"><h2 className="text-xl font-bold text-gray-800">Strategic Recommendations</h2><p className="text-sm text-gray-500">Synthesized action plan from Salience, Power-Interest & Ecosystem analysis.</p></div>
                    {stakeholders.length === 0 ? <EmptyHint msg="Add stakeholders in the Inventory tab first."/> : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {stakeholders.map(s => {
                                const piStrategy = getPowerInterestStrategy(s.power, s.interest);
                                const salience = getSalienceType(s.power, s.legitimacy, s.urgency);
                                const isOpponent = s.support < 0;
                                const isKeyAlly = s.power >= 6 && s.support >= 3;
                                const outgoingInfluence = relationships.filter(r => r.source === s.id && r.type === "Influence").length;
                                const isShadowActor = outgoingInfluence >= 2 && s.power <= 7;
                                return (
                                    <div key={s.id} style={{pageBreakInside:'avoid'}} className="border border-gray-200 rounded-lg p-5 bg-gradient-to-br from-white to-gray-50 shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-2 h-full" style={{backgroundColor:getGroupColor(s.group)}}></div>
                                        <div className="pl-4">
                                            <div className="flex justify-between items-start mb-2"><h3 className="font-bold text-lg text-gray-800">{s.name}</h3><StrategyBadge strategy={piStrategy}/></div>
                                            <div className="flex gap-2 mb-4 flex-wrap items-center">
                                                <SalienceBadge type={salience}/>
                                                <span className={`px-2 py-1 text-[10px] uppercase font-bold rounded ${isOpponent?'bg-red-100 text-red-700':'bg-green-100 text-green-700'}`}>{s.support>0?`Supporter (+${s.support})`:s.support<0?`Opponent (${s.support})`:`Neutral (0)`}</span>
                                                <span className="px-2 py-1 text-[10px] uppercase font-bold rounded bg-blue-100 text-blue-700">Priority {getPriorityScore(s)}</span>
                                            </div>
                                            {s.keyInterests && <p className="text-xs text-gray-500 mb-2"><b>Interests:</b> {s.keyInterests}</p>}
                                            <div className="space-y-2 text-sm text-gray-600">
                                                <p><strong>Primary Approach:</strong> {
                                                    piStrategy === "Manage Closely" ? "Engage actively. Critical to project success — involve in key decisions." :
                                                    piStrategy === "Keep Satisfied" ? "Meet their needs. High power, lower interest — avoid triggering opposition." :
                                                    piStrategy === "Keep Informed" ? "Communicate regularly. They care deeply but lack power — leverage as advocates." :
                                                    "Monitor status. Minimal effort, but watch for shifts in power or interest."
                                                }</p>
                                                {salience === "Definitive" && <p className="text-purple-700">⚠️ <strong>Urgent:</strong> Definitive stakeholder with power, legitimacy & urgent claims. Prioritize immediately.</p>}
                                                {isKeyAlly && <p className="text-emerald-700">★ <strong>Key Ally:</strong> Powerful & supportive. Empower them to champion your project.</p>}
                                                {isOpponent && s.power >= 6 && <p className="text-red-600">🚨 <strong>Risk:</strong> Powerful opponent. Build a mitigation strategy & find common ground.</p>}
                                                {isShadowActor && <p className="text-amber-700">🕵️ <strong>Shadow Actor:</strong> Informal node of influence. Engage behind the scenes to sway formal authorities.</p>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );

            const TABS = [
                {id:'dashboard', label:'Dashboard', icon:<IconDashboard/>},
                {id:'inventory', label:'1. Inventory', icon:<IconUsers/>},
                {id:'pi-matrix', label:'2. Power-Interest', icon:<IconGrid/>},
                {id:'support', label:'3. Support', icon:<IconGrid/>},
                {id:'salience', label:'4. Salience', icon:<IconTarget/>},
                {id:'network', label:'5. Network', icon:<IconNetwork/>},
                {id:'engagement', label:'6. Action Plan', icon:<IconClipboard/>},
                {id:'report', label:'7. Report', icon:<IconActivity/>},
            ];

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10 print:hidden shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-blue-600 to-purple-600 p-2 rounded text-white shadow"><IconNetwork/></div>
                                <div>
                                    <h1 className="font-bold text-lg leading-tight text-gray-900">StakeholderMapper</h1>
                                    <div className="text-[10px] uppercase font-bold text-blue-600 tracking-wider">Strategic Analysis Suite</div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 flex-wrap justify-end">

                                {!isExporting && (
                                    <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 px-2 py-1.5 rounded" title="Bring Your Own Key - Gemini 2.5 Flash">
                                        <span className="text-sm">🔑</span>
                                        <input 
                                            type="password" 
                                            placeholder="Gemini API Key..." 
                                            value={apiKey} 
                                            onChange={e=>setApiKey(e.target.value)} 
                                            className="bg-transparent text-xs outline-none w-28 md:w-36 placeholder-gray-400 text-gray-700"
                                        />
                                    </div>
                                )}

                                <button onClick={()=>setShowHelp(true)} className="flex items-center gap-2 text-sm text-gray-700 bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded transition font-medium"><IconHelp/> Help</button>
                                <button onClick={handleLoadSample} className="flex items-center gap-2 text-sm text-blue-700 bg-blue-50 hover:bg-blue-100 border border-blue-200 px-3 py-1.5 rounded transition font-medium"><IconDownload/> Sample</button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleLoadJSON} className="hidden"/>
                                <button onClick={()=>fileInputRef.current.click()} className="text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 px-2 py-1.5 rounded transition" title="Load JSON"><IconUpload/></button>
                                <button onClick={handleSaveJSON} className="text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 px-2 py-1.5 rounded transition" title="Save JSON"><IconSave/></button>
                                <button onClick={handleExportCSV} disabled={!stakeholders.length} className="text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 px-2 py-1.5 rounded transition disabled:opacity-40" title="Export CSV"><IconCSV/></button>
                                <button onClick={handleClearAll} disabled={!stakeholders.length} className="text-sm text-red-500 bg-red-50 hover:bg-red-100 px-2 py-1.5 rounded transition disabled:opacity-40" title="Clear all"><IconTrash/></button>
                                <button onClick={handleExportPDF} disabled={isExporting || !stakeholders.length} className={`flex items-center gap-2 text-sm text-white px-3 py-1.5 rounded transition shadow-sm ${!stakeholders.length?'bg-gray-400 cursor-not-allowed':'bg-rose-600 hover:bg-rose-700'}`}><IconPDF/> {isExporting?'Generating...':'PDF'}</button>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 flex gap-5 mt-2 overflow-x-auto">
                            {TABS.map(t => (
                                <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`pb-3 flex items-center gap-2 text-sm whitespace-nowrap ${activeTab===t.id?'tab-active':'tab-inactive'}`}>{t.icon} {t.label}</button>
                            ))}
                        </div>
                    </header>

                    <main id="pdf-content" className="max-w-7xl mx-auto px-4 mt-8 relative">
                        {isExporting && (
                            <div className="pdf-header">
                                <h1 className="text-2xl font-bold text-gray-900 border-b pb-2 mb-2">{meta.projectName} — Stakeholder Analysis</h1>
                                <p className="text-sm text-gray-500">{meta.author ? `Prepared by ${meta.author} · ` : ''}Generated {new Date().toLocaleDateString()}</p>
                            </div>
                        )}
                        {(activeTab==='dashboard'||isExporting) && <div className="pdf-section"><DashboardView/></div>}
                        {(activeTab==='inventory'||isExporting) && <div className={`pdf-section ${isExporting?'page-break':''}`}><InventoryView/></div>}
                        {(activeTab==='pi-matrix'||isExporting) && <div className={`pdf-section ${isExporting?'page-break':''}`}><MatrixView/></div>}
                        {(activeTab==='support'||isExporting) && <div className={`pdf-section ${isExporting?'page-break':''}`}><SupportOppositionView/></div>}
                        {(activeTab==='salience'||isExporting) && <div className={`pdf-section ${isExporting?'page-break':''}`}><SalienceView/></div>}
                        {(activeTab==='network'||isExporting) && <div className={`pdf-section ${isExporting?'page-break':''}`}><NetworkView/></div>}
                        {(activeTab==='engagement'||isExporting) && <div className={`pdf-section ${isExporting?'page-break':''}`}><EngagementView/></div>}
                        {(activeTab==='report'||isExporting) && <div className={`pdf-section ${isExporting?'page-break':''}`}><StrategyReportView/></div>}
                    </main>

{showHelp && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-center p-4 modal-overlay backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col overflow-hidden">
                                {/* Header */}
                                <div className="flex justify-between items-center border-b p-5 bg-gray-50 rounded-t-xl">
                                    <div>
                                        <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                            <IconHelp/> Stakeholder Analysis Guide
                                        </h2>
                                        <p className="text-xs text-gray-500 mt-1">Comprehensive scoring methodology and framework definitions.</p>
                                    </div>
                                    <button onClick={()=>setShowHelp(false)} className="text-gray-400 hover:text-red-500 transition bg-white p-2 rounded-full shadow-sm border border-gray-200">
                                        <IconX/>
                                    </button>
                                </div>
                                
                                {/* Content */}
                                <div className="p-6 overflow-y-auto bg-white space-y-8 flex-1">
                                    
                                    {/* Introduction */}
                                    <div className="text-sm text-gray-600 bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r">
                                        <strong>Why accurate scoring matters:</strong> The intelligence of this tool relies heavily on your inputs. By scoring stakeholders accurately across these dimensions, the system automatically runs algorithms based on international standard frameworks (Mendelow & Mitchell) to generate targeted engagement strategies and identify hidden risks.
                                    </div>

                                    {/* Section 1: Core Scoring Metrics */}
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4">1. Core Evaluation Metrics</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            
                                            {/* Power */}
                                            <div className="p-4 rounded-lg border border-gray-200 bg-gray-50 hover:border-blue-300 transition">
                                                <h4 className="font-bold text-blue-700 flex justify-between items-center mb-2">
                                                    Power <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs">Scale: 0 - 10</span>
                                                </h4>
                                                <p className="text-xs text-gray-600 mb-3">The capacity to influence, facilitate, or block the project's success.</p>
                                                <ul className="text-xs space-y-1.5 text-gray-600">
                                                    <li><span className="font-semibold text-gray-800">0-3 (Low):</span> Can voice opinions but cannot enforce changes.</li>
                                                    <li><span className="font-semibold text-gray-800">4-7 (Medium):</span> Can cause delays or influence others.</li>
                                                    <li><span className="font-semibold text-gray-800">8-10 (High):</span> Holds veto power, key funding, or absolute authority.</li>
                                                </ul>
                                            </div>

                                            {/* Interest */}
                                            <div className="p-4 rounded-lg border border-gray-200 bg-gray-50 hover:border-orange-300 transition">
                                                <h4 className="font-bold text-orange-700 flex justify-between items-center mb-2">
                                                    Interest <span className="bg-orange-100 text-orange-800 px-2 py-0.5 rounded text-xs">Scale: 0 - 10</span>
                                                </h4>
                                                <p className="text-xs text-gray-600 mb-3">How much the stakeholder cares about or is affected by the outcomes.</p>
                                                <ul className="text-xs space-y-1.5 text-gray-600">
                                                    <li><span className="font-semibold text-gray-800">0-3 (Low):</span> Indifferent or minimally impacted.</li>
                                                    <li><span className="font-semibold text-gray-800">4-7 (Medium):</span> Indirectly affected, monitors progress occasionally.</li>
                                                    <li><span className="font-semibold text-gray-800">8-10 (High):</span> Directly impacted, mission-critical to them.</li>
                                                </ul>
                                            </div>

                                            {/* Legitimacy */}
                                            <div className="p-4 rounded-lg border border-gray-200 bg-gray-50 hover:border-purple-300 transition">
                                                <h4 className="font-bold text-purple-700 flex justify-between items-center mb-2">
                                                    Legitimacy <span className="bg-purple-100 text-purple-800 px-2 py-0.5 rounded text-xs">Scale: 0 - 10</span>
                                                </h4>
                                                <p className="text-xs text-gray-600 mb-3">The perceived appropriateness, moral right, or legal standing of their involvement.</p>
                                                <ul className="text-xs space-y-1.5 text-gray-600">
                                                    <li><span className="font-semibold text-gray-800">0-3 (Low):</span> Fringe groups or baseless claims.</li>
                                                    <li><span className="font-semibold text-gray-800">4-7 (Medium):</span> Socially recognized but lacks formal authority.</li>
                                                    <li><span className="font-semibold text-gray-800">8-10 (High):</span> Statutory authority or direct contractual relationship.</li>
                                                </ul>
                                            </div>

                                            {/* Urgency */}
                                            <div className="p-4 rounded-lg border border-gray-200 bg-gray-50 hover:border-rose-300 transition">
                                                <h4 className="font-bold text-rose-700 flex justify-between items-center mb-2">
                                                    Urgency <span className="bg-rose-100 text-rose-800 px-2 py-0.5 rounded text-xs">Scale: 0 - 10</span>
                                                </h4>
                                                <p className="text-xs text-gray-600 mb-3">The time-sensitivity and criticality of their claims or needs.</p>
                                                <ul className="text-xs space-y-1.5 text-gray-600">
                                                    <li><span className="font-semibold text-gray-800">0-3 (Low):</span> Can wait indefinitely; normal lifecycle.</li>
                                                    <li><span className="font-semibold text-gray-800">4-7 (Medium):</span> Requires attention in the near term.</li>
                                                    <li><span className="font-semibold text-gray-800">8-10 (High):</span> Immediate, critical action required; high risk if ignored.</li>
                                                </ul>
                                            </div>

                                        </div>
                                    </div>

                                    {/* Section 2: Support & Sentiment */}
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4">2. Sentiment & Attitude</h3>
                                        <div className="bg-emerald-50 p-5 rounded-lg border border-emerald-100">
                                            <h4 className="font-bold text-emerald-800 mb-2 flex justify-between">
                                                Support Level <span className="bg-white border border-emerald-200 text-emerald-800 px-2 py-0.5 rounded text-xs">Scale: -5 to +5</span>
                                            </h4>
                                            <p className="text-xs text-emerald-900/80 mb-4">Indicates the stakeholder's current stance toward the project. Combined with 'Power', this identifies your Key Allies and Powerful Opponents.</p>
                                            
                                            <div className="flex justify-between items-stretch text-xs text-center bg-white rounded-lg shadow-sm border border-emerald-100 overflow-hidden">
                                                <div className="text-red-700 p-3 w-1/3 border-r border-gray-100 bg-red-50/30">
                                                    <div className="text-lg font-bold mb-1">-5 to -3</div>
                                                    <div className="font-semibold">Strong Opponent</div>
                                                    <div className="text-[10px] text-gray-500 mt-1">Actively working against the project.</div>
                                                </div>
                                                <div className="text-gray-600 p-3 w-1/3 border-r border-gray-100">
                                                    <div className="text-lg font-bold mb-1">-2 to +2</div>
                                                    <div className="font-semibold">Neutral / Mild</div>
                                                    <div className="text-[10px] text-gray-500 mt-1">Skeptical, undecided, or mildly supportive.</div>
                                                </div>
                                                <div className="text-emerald-700 p-3 w-1/3 bg-emerald-50/30">
                                                    <div className="text-lg font-bold mb-1">+3 to +5</div>
                                                    <div className="font-semibold">Strong Supporter</div>
                                                    <div className="text-[10px] text-gray-500 mt-1">Actively championing and defending the project.</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Section 3: Frameworks Explained */}
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4">3. Analytical Frameworks Used</h3>
                                        <div className="space-y-3">
                                            <div className="p-4 bg-gray-50 rounded border border-gray-200">
                                                <h4 className="font-bold text-gray-800 text-sm mb-1">📊 Mendelow's Power-Interest Matrix</h4>
                                                <p className="text-xs text-gray-600">Maps <strong>Power</strong> against <strong>Interest</strong> to automatically assign an engagement strategy: <em>Manage Closely</em> (High P, High I), <em>Keep Satisfied</em> (High P, Low I), <em>Keep Informed</em> (Low P, High I), and <em>Monitor</em> (Low P, Low I).</p>
                                            </div>
                                            <div className="p-4 bg-gray-50 rounded border border-gray-200">
                                                <h4 className="font-bold text-gray-800 text-sm mb-1">🎯 Mitchell's Salience Model</h4>
                                                <p className="text-xs text-gray-600">Evaluates the overlap of <strong>Power</strong>, <strong>Legitimacy</strong>, and <strong>Urgency</strong>. Stakeholders possessing all three attributes are classified as <em>Definitive</em> and require absolute top priority.</p>
                                            </div>
                                            <div className="p-4 bg-gray-50 rounded border border-gray-200">
                                                <h4 className="font-bold text-gray-800 text-sm mb-1">⭐ Priority Index Formula</h4>
                                                <p className="text-xs text-gray-600">A weighted algorithm to rank attention: <code>(Power × 0.3) + (Urgency × 0.3) + (Interest × 0.2) + (Legitimacy × 0.2)</code>. Results are scaled to a 0-100 index for easy prioritization.</p>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                                
                                {/* Footer */}
                                <div className="border-t p-4 bg-gray-50 rounded-b-xl flex justify-end">
                                    <button onClick={()=>setShowHelp(false)} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-lg font-semibold transition shadow-sm flex items-center gap-2">
                                        Acknowledge & Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
